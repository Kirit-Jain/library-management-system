# ============================================
# TEST PROFILE
# For automated tests (JUnit, Integration)
# Uses Testcontainers for real PostgreSQL
# ============================================

spring:
  # DATABASE - Testcontainers auto-provisions PostgreSQL
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///library_test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      pool-name: LibraryTestPool
      maximum-pool-size: 3
      minimum-idle: 1

  # JPA - Create fresh schema for each test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # FLYWAY - Disabled (we use create-drop)
  flyway:
    enabled: false

  # REDIS - Different port to avoid conflicts
  data:
    redis:
      host: localhost
      port: 6370

  # CACHE - Simple in-memory cache for tests
  cache:
    type: simple

  # EMAIL - Disabled in tests
  mail:
    host: localhost
    port: 25
    test-connection: false

# ============================================
# LIBRARY - Disable email sending in tests
# ============================================
library:
  email:
    enabled: false

# ============================================
# RATE LIMITING - Disabled for tests
# ============================================
rate-limit:
  enabled: false

# ============================================
# LOGGING - Quiet during tests
# ============================================
logging:
  level:
    root: WARN
    com.library.management: INFO
    org.testcontainers: WARN
    org.hibernate: ERROR
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ============================================
# JWT - Test secret (only for tests!)
# ============================================
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 3600000              # 1 hour
  refresh-expiration: 86400000     # 1 day

# ============================================
# ACTUATOR - Disabled in tests
# ============================================
management:
  endpoints:
    enabled-by-default: false